name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build extension
        run: make GEN=ninja

      - name: Run sqllogictest (offline — no server needed)
        run: |
          uv run python -m duckdb_sqllogictest \
            --test-dir test/sql \
            --external-extension build/release/http_enterprise.duckdb_extension \
            --file-path test/sql/http_client_local.test

      - name: Start local test server
        run: |
          uv run python test/flask_concurrency_server.py &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8444/health > /dev/null && break
            sleep 0.5
          done

      - name: Run sqllogictest (server tests)
        run: |
          uv run python -m duckdb_sqllogictest \
            --test-dir test/sql \
            --external-extension build/release/http_enterprise.duckdb_extension \
            --file-path test/sql/http_client_server.test

      - name: Run pytest (parallel execution verification)
        run: uv run pytest test/test_integration.py -v

      - name: Stop test server
        if: always()
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            taskkill //F //FI "WINDOWTITLE eq flask*" 2>/dev/null || true
            # Also kill by image name matching python running our server
            wmic process where "commandline like '%%flask_concurrency_server%%'" delete 2>/dev/null || true
          else
            pkill -f flask_concurrency_server || true
          fi

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: http_enterprise-${{ runner.os }}
          path: build/release/http_enterprise.duckdb_extension
